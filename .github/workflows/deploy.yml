name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_POS_SUPABASE_URL: ${{ secrets.VITE_POS_SUPABASE_URL }}
          VITE_POS_SUPABASE_ANON_KEY: ${{ secrets.VITE_POS_SUPABASE_ANON_KEY }}
          VITE_SHOP_NAME: TIMES STORE
          VITE_BUILD_ID: ${{ github.sha }}
          # false = real Edge Functions (Hybrid B). Requires Shop + POS secrets above.
          VITE_USE_MOCK_API: ${{ secrets.VITE_USE_MOCK_API || 'true' }}
          VITE_GOOGLE_REDIRECT_URL: ${{ secrets.VITE_GOOGLE_REDIRECT_URL }}
        run: npm run build
      - name: Write version manifest
        run: |
          printf '{"buildId":"%s","builtAt":"%s"}\n' \
            "${{ github.sha }}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > dist/version.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
